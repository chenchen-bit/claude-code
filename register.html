<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');

  :root {
    --bg-primary: #0d0d12;
    --bg-card: #16161d;
    --bg-input: transparent;
    --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.35);
    --accent-dim: rgba(0, 212, 255, 0.12);
    --text-primary: #e8e8ed;
    --text-secondary: #9494a0;
    --text-muted: #555560;
    --border: #25252d;
    --radius: 12px;
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
    --transition-slow: 0.6s ease-out;
  }

  body {
    font-family: var(--font-family);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    z-index: 0;
  }
  .bg .glow {
    position: absolute;
    width: 640px; height: 640px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,.07) 0%, transparent 65%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .bg .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.05) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .card {
    position: relative; z-index: 1;
    width: 420px;
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid rgba(0,212,255,.08);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.02),
      0 8px 32px rgba(0,0,0,.6);
    padding: 44px 40px 40px;
    animation: cardIn var(--transition-slow) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand .logo {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 52px; height: 52px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,212,255,.15);
    margin-bottom: 12px;
  }
  .brand .logo svg {
    width: 26px; height: 26px;
    fill: var(--accent);
  }
  .brand h1 {
    color: var(--text-primary);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.3px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color var(--transition-normal);
  }
  .input-wrap .icon svg { display: block; width: 100%; height: 100%; fill: currentColor; }
  .input-wrap input {
    width: 100%;
    padding: 12px 30px 12px 30px;
    background: var(--bg-input);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 15px;
    font-family: var(--font-family);
    outline: none;
    transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
  }
  .input-wrap input::placeholder {
    color: var(--text-muted);
  }
  .input-wrap input:focus {
    border-bottom-color: var(--accent);
    box-shadow: 0 1px 8px var(--accent-dim);
  }
  .input-wrap:focus-within .icon {
    color: var(--accent);
  }

  /* error state */
  .input-wrap.error input {
    border-bottom-color: #ef4444;
    box-shadow: 0 1px 8px rgba(239,68,68,.15);
  }
  .input-wrap.error .icon {
    color: #ef4444;
  }
  .field-error {
    font-size: 12px;
    color: #ef4444;
    margin-top: 4px;
    min-height: 0;
    opacity: 0;
    transition: opacity var(--transition-normal);
  }
  .field-error.is-visible {
    opacity: 1;
  }

  .input-wrap .toggle-pw {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    transition: color var(--transition-normal);
  }
  .input-wrap .toggle-pw:hover { color: var(--text-secondary); }
  .input-wrap .toggle-pw svg { width: 18px; height: 18px; fill: currentColor; display: block; }

  /* password strength */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .strength-bar span {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: var(--border);
    transition: background var(--transition-normal);
  }
  .strength-bar span.active.weak   { background: #ef4444; }
  .strength-bar span.active.medium { background: #f59e0b; }
  .strength-bar span.active.strong { background: var(--accent); }

  /* terms */
  .terms {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 0 0 24px;
  }
  .terms input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    min-width: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    margin-top: 1px;
    transition: background var(--transition-normal), border-color var(--transition-normal);
    position: relative;
  }
  .terms input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .terms input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 6px; height: 9px;
    border: solid var(--bg-primary);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .terms label {
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    line-height: 1.5;
  }
  .terms a {
    color: var(--accent);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity var(--transition-normal);
  }
  .terms a:hover { opacity: 1; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font-family);
    cursor: pointer;
    transition: box-shadow var(--transition-normal), transform var(--transition-fast);
    position: relative;
  }
  .btn-primary:hover {
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    opacity: 0.7;
    transition: opacity var(--transition-normal);
  }
  .footer a:hover { opacity: 1; }

  /* toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    z-index: 100;
    padding: 12px 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font-family);
    color: var(--text-primary);
    background: var(--bg-card);
    opacity: 0;
    transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .4s;
    pointer-events: none;
  }
  .toast.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error {
    border-color: rgba(239,68,68,.4);
    box-shadow: 0 0 12px rgba(239,68,68,.15);
  }
  .toast.success {
    border-color: rgba(34,197,94,.4);
    box-shadow: 0 0 12px rgba(34,197,94,.15);
  }

  @media (max-width: 480px) {
    .card { width: calc(100% - 24px); padding: 32px 24px 28px; }
    .brand h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="glow"></div>
  <div class="grid"></div>
</div>

<div class="toast" id="toast"></div>

<div class="card">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </div>
    <h1>创客</h1>
  </div>

  <form id="registerForm" novalidate>
    <div class="form-group">
      <label for="username">用户名</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </span>
        <input type="text" id="username" placeholder="your_name" autocomplete="username" required>
      </div>
      <div class="field-error" id="usernameError"></div>
    </div>

    <div class="form-group">
      <label for="email">邮箱</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5z"/></svg>
        </span>
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email" required>
      </div>
      <div class="field-error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label for="password">密码</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6a5 5 0 00-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3-9H9V6a3 3 0 116 0z"/></svg>
        </span>
        <input type="password" id="password" placeholder="至少 6 位" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="切换密码可见">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <div class="strength-bar" id="strengthBar">
        <span></span><span></span><span></span>
      </div>
      <div class="field-error" id="passwordError"></div>
    </div>

    <div class="form-group">
      <label for="confirmPw">确认密码</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6a5 5 0 00-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3-9H9V6a3 3 0 116 0z"/></svg>
        </span>
        <input type="password" id="confirmPw" placeholder="再次输入密码" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" id="toggleConfirmPw" aria-label="切换密码可见">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <div class="field-error" id="confirmError"></div>
    </div>

    <div class="terms">
      <input type="checkbox" id="agreeTerms" required>
      <label for="agreeTerms">我已阅读并同意 <a href="#" target="_blank">服务条款</a> 和 <a href="#" target="_blank">隐私政策</a></label>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">注 册</button>
  </form>

  <div class="footer">
    已有账号？<a href="login.html">立即登录</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  const form = document.getElementById('registerForm');
  const usernameEl = document.getElementById('username');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const confirmEl = document.getElementById('confirmPw');
  const agreeEl = document.getElementById('agreeTerms');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');

  const errors = {
    username: document.getElementById('usernameError'),
    email: document.getElementById('emailError'),
    password: document.getElementById('passwordError'),
    confirm: document.getElementById('confirmError'),
  };

  function setFieldError(wrapEl, errorEl, msg) {
    wrapEl.classList.toggle('error', !!msg);
    errorEl.textContent = msg || '';
    errorEl.classList.toggle('is-visible', !!msg);
  }

  function showToast(message, type) {
    toast.textContent = message;
    toast.className = 'toast ' + type + ' is-visible';
    setTimeout(function () { toast.classList.remove('is-visible'); }, 3500);
  }

  // ---- password toggle ----
  function togglePasswordVisibility(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    btn.addEventListener('click', function () {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      this.innerHTML = isPassword
        ? '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
        : '<svg viewBox="0 0 24 24"><path d="M3.27 2L2 3.27 6.22 7.5A10.5 10.5 0 001 12c1.73 4.39 6 7.5 11 7.5 1.85 0 3.62-.45 5.19-1.27L20.73 22 22 20.73 3.27 2zM12 17c-2.76 0-5-2.24-5-5 0-1.01.3-1.95.82-2.74l1.67 1.67A3.07 3.07 0 009 12a3 3 0 003 3c.47 0 .92-.11 1.33-.3l1.2 1.2A5.06 5.06 0 0112 17zm8.38-1.12l-1.8-1.8c.27-.65.42-1.35.42-2.08 0-2.76-2.24-5-5-5-1.37 0-2.63.55-3.55 1.43L7.65 5.5A10.5 10.5 0 0112 4.5c5 0 9.27 3.11 11 7.5a10.77 10.77 0 01-2.62 3.88z"/></svg>';
    });
  }
  togglePasswordVisibility('password', 'togglePw');
  togglePasswordVisibility('confirmPw', 'toggleConfirmPw');

  // ---- password strength meter ----
  const strengthBars = document.querySelectorAll('#strengthBar span');

  function updateStrength(pw) {
    var len = pw.length;
    var level = 0;
    if (len >= 6) {
      var hasLetter = /[a-zA-Z]/.test(pw);
      var hasDigit = /\d/.test(pw);
      var hasSpecial = /[^a-zA-Z0-9]/.test(pw);
      var kinds = hasLetter + hasDigit + hasSpecial;
      if (len >= 8 && kinds >= 2) level = 3;
      else if (len >= 6 && kinds >= 1) level = 2;
      else level = 1;
    }
    var labels = ['', 'weak', 'medium', 'strong'];
    strengthBars.forEach(function (bar, i) {
      bar.className = '';
      if (i < level) bar.classList.add('active', labels[level]);
    });
  }

  passwordEl.addEventListener('input', function () {
    updateStrength(this.value);
    if (confirmEl.value) {
      var match = this.value === confirmEl.value;
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm,
        match ? '' : '两次密码不一致');
    }
  });

  confirmEl.addEventListener('input', function () {
    if (this.value) {
      var match = this.value === passwordEl.value;
      setFieldError(this.closest('.input-wrap'), errors.confirm,
        match ? '' : '两次密码不一致');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.confirm, '');
    }
  });

  // ---- validation ----
  function validateForm() {
    var valid = true;

    var username = usernameEl.value.trim();
    if (!username) {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '请输入用户名');
      valid = false;
    } else if (username.length < 2) {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '用户名至少 2 个字符');
      valid = false;
    } else {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '');
    }

    var email = emailEl.value.trim();
    var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '请输入邮箱');
      valid = false;
    } else if (!emailRe.test(email)) {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '邮箱格式不正确');
      valid = false;
    } else {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '');
    }

    var password = passwordEl.value;
    if (!password) {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '请输入密码');
      valid = false;
    } else if (password.length < 6) {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '密码至少 6 位');
      valid = false;
    } else {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '');
    }

    var confirm = confirmEl.value;
    if (!confirm) {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '请确认密码');
      valid = false;
    } else if (confirm !== password) {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '两次密码不一致');
      valid = false;
    } else {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '');
    }

    if (!agreeEl.checked) {
      showToast('请同意服务条款和隐私政策', 'error');
      valid = false;
    }

    return valid;
  }

  // ---- form submit ----
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!validateForm()) return;

    var username = usernameEl.value.trim();
    var email = emailEl.value.trim();
    var password = passwordEl.value;

    var users = JSON.parse(localStorage.getItem('maker_users') || '[]');
    if (users.some(function (u) { return u.email === email; })) {
      showToast('该邮箱已被注册', 'error');
      return;
    }

    users.push({ username: username, email: email, password: password });
    localStorage.setItem('maker_users', JSON.stringify(users));

    submitBtn.textContent = '注册成功…';
    submitBtn.disabled = true;
    showToast('注册成功！正在跳转…', 'success');

    setTimeout(function () {
      window.location.href = 'login.html?email=' + encodeURIComponent(email);
    }, 1200);
  });

  // ---- blur validations ----
  usernameEl.addEventListener('blur', function () {
    var v = this.value.trim();
    if (v && v.length < 2) {
      setFieldError(this.closest('.input-wrap'), errors.username, '用户名至少 2 个字符');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.username, '');
    }
  });

  emailEl.addEventListener('blur', function () {
    var v = this.value.trim();
    var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (v && !emailRe.test(v)) {
      setFieldError(this.closest('.input-wrap'), errors.email, '邮箱格式不正确');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.email, '');
    }
  });
})();
</script>
</body>
</html>
