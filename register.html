<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 · 创客</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0d15;
    overflow: hidden;
  }

  /* ===== Animated Background ===== */
  .bg {
    position: fixed; inset: 0; z-index: 0;
  }
  .bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,.35) 0%, transparent 70%);
    top: -150px; left: -150px;
    animation: floatA 20s ease-in-out infinite;
  }
  .bg::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,.25) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: floatB 25s ease-in-out infinite;
  }
  @keyframes floatA {
    0%, 100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(80px,60px) scale(1.1); }
    66%      { transform: translate(-40px,100px) scale(.95); }
  }
  @keyframes floatB {
    0%, 100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(-60px,-80px) scale(1.08); }
    66%      { transform: translate(50px,-40px) scale(.92); }
  }

  .bg .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .particles {
    position: absolute; inset: 0; overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,255,255,.15);
    border-radius: 50%;
    animation: rise linear infinite;
  }
  .particle:nth-child(1)  { left:10%;  width:5px;height:5px; animation-duration:18s; animation-delay:0s; }
  .particle:nth-child(2)  { left:25%;  width:3px;height:3px; animation-duration:22s; animation-delay:2s; }
  .particle:nth-child(3)  { left:40%;  width:6px;height:6px; animation-duration:16s; animation-delay:4s; }
  .particle:nth-child(4)  { left:55%;  width:3px;height:3px; animation-duration:20s; animation-delay:1s; }
  .particle:nth-child(5)  { left:70%;  width:5px;height:5px; animation-duration:24s; animation-delay:3s; }
  .particle:nth-child(6)  { left:85%;  width:4px;height:4px; animation-duration:19s; animation-delay:5s; }
  .particle:nth-child(7)  { left:50%;  width:3px;height:3px; animation-duration:21s; animation-delay:7s; }
  .particle:nth-child(8)  { left:15%;  width:5px;height:5px; animation-duration:17s; animation-delay:6s; }
  @keyframes rise {
    0%   { transform: translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:1; }
    100% { transform: translateY(-10vh) scale(1); opacity:0; }
  }

  /* ===== Card ===== */
  .card {
    position: relative; z-index: 1;
    width: 420px;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,.06);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.03),
      0 20px 60px rgba(0,0,0,.5);
    padding: 44px 40px 40px;
    animation: cardIn .8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* ===== Brand ===== */
  .brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand .logo {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 52px; height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(99,102,241,.35);
  }
  .brand .logo svg {
    width: 26px; height: 26px;
    fill: #fff;
  }
  .brand h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.3px;
  }
  .brand p {
    color: rgba(255,255,255,.4);
    font-size: 14px;
    margin-top: 4px;
  }

  /* ===== Form ===== */
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    color: rgba(255,255,255,.6);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: rgba(255,255,255,.25);
    pointer-events: none;
    transition: color .25s;
  }
  .input-wrap .icon svg { display:block; width:100%; height:100%; fill:currentColor; }
  .input-wrap input {
    width: 100%;
    padding: 13px 14px 13px 44px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  .input-wrap input::placeholder {
    color: rgba(255,255,255,.2);
  }
  .input-wrap input:focus {
    border-color: rgba(99,102,241,.5);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .input-wrap:focus-within .icon {
    color: rgba(99,102,241,.7);
  }

  /* error state */
  .input-wrap.error input {
    border-color: rgba(239,68,68,.6);
    box-shadow: 0 0 0 3px rgba(239,68,68,.15);
  }
  .input-wrap.error .icon {
    color: rgba(239,68,68,.6);
  }
  .field-error {
    font-size: 12px;
    color: #ef4444;
    margin-top: 4px;
    min-height: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .field-error.is-visible {
    opacity: 1;
  }

  /* password strength */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .strength-bar span {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,.06);
    transition: background .3s;
  }
  .strength-bar span.active.weak   { background: #ef4444; }
  .strength-bar span.active.medium { background: #f59e0b; }
  .strength-bar span.active.strong { background: #22c55e; }

  /* ===== Button ===== */
  .btn-primary {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(99,102,241,.3);
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(99,102,241,.45);
  }
  .btn-primary:active {
    transform: scale(.98);
  }
  .btn-primary:disabled {
    opacity: .5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.08) 100%);
    pointer-events: none;
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    z-index: 100;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    opacity: 0;
    transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .4s;
    pointer-events: none;
  }
  .toast.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error {
    background: rgba(239,68,68,.9);
    backdrop-filter: blur(8px);
  }
  .toast.success {
    background: rgba(34,197,94,.9);
    backdrop-filter: blur(8px);
  }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    margin-top: 22px;
    color: rgba(255,255,255,.3);
    font-size: 13px;
  }
  .footer a {
    color: rgba(99,102,241,.6);
    text-decoration: none;
    font-weight: 500;
    transition: color .2s;
  }
  .footer a:hover { color: #818cf8; }

  /* ===== Terms ===== */
  .terms {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 14px 0 18px;
    font-size: 13px;
    color: rgba(255,255,255,.45);
  }
  .terms input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    min-width: 16px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    margin-top: 2px;
    transition: background .2s, border-color .2s;
    position: relative;
  }
  .terms input[type="checkbox"]:checked {
    background: #6366f1;
    border-color: #6366f1;
  }
  .terms input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 6px; height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .terms a {
    color: rgba(99,102,241,.6);
    text-decoration: none;
  }
  .terms a:hover { color: #818cf8; }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    .card { width: calc(100% - 24px); padding: 32px 24px 28px; }
    .brand h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="grid"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="card">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </div>
    <h1>创客</h1>
    <p>创建你的账号</p>
  </div>

  <form id="registerForm" novalidate>
    <div class="form-group">
      <label for="username">用户名</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </span>
        <input type="text" id="username" placeholder="your_name" autocomplete="username" required>
      </div>
      <div class="field-error" id="usernameError"></div>
    </div>

    <div class="form-group">
      <label for="email">邮箱</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5z"/></svg>
        </span>
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email" required>
      </div>
      <div class="field-error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label for="password">密码</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6a5 5 0 00-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3-9H9V6a3 3 0 116 0z"/></svg>
        </span>
        <input type="password" id="password" placeholder="至少 6 位" autocomplete="new-password" required>
      </div>
      <div class="strength-bar" id="strengthBar">
        <span></span><span></span><span></span>
      </div>
      <div class="field-error" id="passwordError"></div>
    </div>

    <div class="form-group">
      <label for="confirmPw">确认密码</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6a5 5 0 00-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3-9H9V6a3 3 0 116 0z"/></svg>
        </span>
        <input type="password" id="confirmPw" placeholder="再次输入密码" autocomplete="new-password" required>
      </div>
      <div class="field-error" id="confirmError"></div>
    </div>

    <div class="terms">
      <input type="checkbox" id="agreeTerms" required>
      <label for="agreeTerms">我已阅读并同意 <a href="#" target="_blank">服务条款</a> 和 <a href="#" target="_blank">隐私政策</a></label>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">注 册</button>
  </form>

  <div class="footer">
    已有账号？<a href="login.html">立即登录</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  const form = document.getElementById('registerForm');
  const usernameEl = document.getElementById('username');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const confirmEl = document.getElementById('confirmPw');
  const agreeEl = document.getElementById('agreeTerms');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');

  const errors = {
    username: document.getElementById('usernameError'),
    email: document.getElementById('emailError'),
    password: document.getElementById('passwordError'),
    confirm: document.getElementById('confirmError'),
  };

  function setFieldError(wrapEl, errorEl, msg) {
    wrapEl.classList.toggle('error', !!msg);
    errorEl.textContent = msg || '';
    errorEl.classList.toggle('is-visible', !!msg);
  }

  function showToast(message, type) {
    toast.textContent = message;
    toast.className = 'toast ' + type + ' is-visible';
    setTimeout(() => toast.classList.remove('is-visible'), 3500);
  }

  // ---- password strength meter ----
  const strengthBars = document.querySelectorAll('#strengthBar span');

  function updateStrength(pw) {
    const len = pw.length;
    let level = 0;
    if (len >= 6) {
      const hasLetter = /[a-zA-Z]/.test(pw);
      const hasDigit = /\d/.test(pw);
      const hasSpecial = /[^a-zA-Z0-9]/.test(pw);
      const kinds = hasLetter + hasDigit + hasSpecial;
      if (len >= 8 && kinds >= 2) level = 3;
      else if (len >= 6 && kinds >= 1) level = 2;
      else level = 1;
    }
    const labels = ['', 'weak', 'medium', 'strong'];
    strengthBars.forEach((bar, i) => {
      bar.className = '';
      if (i < level) bar.classList.add('active', labels[level]);
    });
  }

  passwordEl.addEventListener('input', function () {
    updateStrength(this.value);
    if (confirmEl.value) {
      const match = this.value === confirmEl.value;
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm,
        match ? '' : '两次密码不一致');
    }
  });

  confirmEl.addEventListener('input', function () {
    if (this.value) {
      const match = this.value === passwordEl.value;
      setFieldError(this.closest('.input-wrap'), errors.confirm,
        match ? '' : '两次密码不一致');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.confirm, '');
    }
  });

  // ---- validation ----
  function validateForm() {
    let valid = true;

    const username = usernameEl.value.trim();
    if (!username) {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '请输入用户名');
      valid = false;
    } else if (username.length < 2) {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '用户名至少 2 个字符');
      valid = false;
    } else {
      setFieldError(usernameEl.closest('.input-wrap'), errors.username, '');
    }

    const email = emailEl.value.trim();
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '请输入邮箱');
      valid = false;
    } else if (!emailRe.test(email)) {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '邮箱格式不正确');
      valid = false;
    } else {
      setFieldError(emailEl.closest('.input-wrap'), errors.email, '');
    }

    const password = passwordEl.value;
    if (!password) {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '请输入密码');
      valid = false;
    } else if (password.length < 6) {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '密码至少 6 位');
      valid = false;
    } else {
      setFieldError(passwordEl.closest('.input-wrap'), errors.password, '');
    }

    const confirm = confirmEl.value;
    if (!confirm) {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '请确认密码');
      valid = false;
    } else if (confirm !== password) {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '两次密码不一致');
      valid = false;
    } else {
      setFieldError(confirmEl.closest('.input-wrap'), errors.confirm, '');
    }

    if (!agreeEl.checked) {
      showToast('请同意服务条款和隐私政策', 'error');
      valid = false;
    }

    return valid;
  }

  // ---- form submit ----
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!validateForm()) return;

    const username = usernameEl.value.trim();
    const email = emailEl.value.trim();
    const password = passwordEl.value;

    const users = JSON.parse(localStorage.getItem('maker_users') || '[]');
    if (users.some(u => u.email === email)) {
      showToast('该邮箱已被注册', 'error');
      return;
    }

    users.push({ username, email, password });
    localStorage.setItem('maker_users', JSON.stringify(users));

    submitBtn.textContent = '注册成功…';
    submitBtn.disabled = true;
    showToast('注册成功！正在跳转…', 'success');

    setTimeout(() => {
      window.location.href = 'login.html?email=' + encodeURIComponent(email);
    }, 1200);
  });

  usernameEl.addEventListener('blur', function () {
    const v = this.value.trim();
    if (v && v.length < 2) {
      setFieldError(this.closest('.input-wrap'), errors.username, '用户名至少 2 个字符');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.username, '');
    }
  });

  emailEl.addEventListener('blur', function () {
    const v = this.value.trim();
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (v && !emailRe.test(v)) {
      setFieldError(this.closest('.input-wrap'), errors.email, '邮箱格式不正确');
    } else {
      setFieldError(this.closest('.input-wrap'), errors.email, '');
    }
  });
})();
</script>
</body>
</html>
