<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');

  :root {
    --bg-primary: #050505;
    --bg-card: #0a0a0a;
    --bg-input: transparent;
    --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.4);
    --accent-dim: rgba(0, 212, 255, 0.15);
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: #1a1a1a;
    --border-focus: #00d4ff;
    --radius: 12px;
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
    --transition-slow: 0.6s ease-out;
  }

  body {
    font-family: var(--font-family);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    z-index: 0;
  }
  .bg .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .card {
    position: relative; z-index: 1;
    width: 420px;
    background: var(--bg-card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    padding: 44px 40px 40px;
    animation: cardIn var(--transition-slow) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand .logo {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 52px; height: 52px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    box-shadow: 0 0 16px var(--accent-dim);
    margin-bottom: 12px;
  }
  .brand .logo svg {
    width: 26px; height: 26px;
    fill: var(--accent);
  }
  .brand h1 {
    color: var(--text-primary);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -.3px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color var(--transition-normal);
  }
  .input-wrap .icon svg { display: block; width: 100%; height: 100%; fill: currentColor; }
  .input-wrap input {
    width: 100%;
    padding: 12px 12px 12px 30px;
    background: var(--bg-input);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 15px;
    font-family: var(--font-family);
    outline: none;
    transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
  }
  .input-wrap input::placeholder {
    color: var(--text-muted);
  }
  .input-wrap input:focus {
    border-bottom-color: var(--accent);
    box-shadow: 0 1px 8px var(--accent-dim);
  }
  .input-wrap:focus-within .icon {
    color: var(--accent);
  }

  .toggle-pw {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    transition: color var(--transition-normal);
  }
  .toggle-pw:hover { color: var(--text-secondary); }
  .toggle-pw svg { width: 18px; height: 18px; fill: currentColor; display: block; }

  .options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 24px;
    font-size: 13px;
  }
  .options label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  .options label input[type="checkbox"] {
    appearance: none;
    width: 16px; height: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--transition-normal), border-color var(--transition-normal);
    position: relative;
  }
  .options label input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .options label input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 6px; height: 9px;
    border: solid var(--bg-primary);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .options a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    opacity: 0.7;
    transition: opacity var(--transition-normal);
  }
  .options a:hover { opacity: 1; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font-family);
    cursor: pointer;
    transition: box-shadow var(--transition-normal), transform var(--transition-fast);
  }
  .btn-primary:hover {
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .btn-primary:active {
    transform: scale(0.98);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    color: var(--text-muted);
    font-size: 12px;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .social-row {
    display: flex;
    gap: 10px;
  }
  .social-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-family: var(--font-family);
    cursor: pointer;
    transition: border-color var(--transition-normal), box-shadow var(--transition-normal), color var(--transition-normal);
    text-decoration: none;
  }
  .social-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-dim);
    color: var(--text-primary);
  }
  .social-btn svg { width: 18px; height: 18px; }

  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    opacity: 0.7;
    transition: opacity var(--transition-normal);
  }
  .footer a:hover { opacity: 1; }

  @media (max-width: 480px) {
    .card { width: calc(100% - 24px); padding: 32px 24px 28px; }
    .brand h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="grid"></div>
</div>

<div class="card">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm1 14.5a1.5 1.5 0 01-3 0v-1a1.5 1.5 0 013 0zm-.25-4.25a.75.75 0 01-1.5 0V9.5a.75.75 0 011.5 0z"/></svg>
    </div>
    <h1>创客</h1>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">邮箱</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5z"/></svg>
        </span>
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email" required>
      </div>
    </div>

    <div class="form-group">
      <label for="password">密码</label>
      <div class="input-wrap">
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6a5 5 0 00-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3-9H9V6a3 3 0 116 0z"/></svg>
        </span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="切换密码可见">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" checked> 记住我
      </label>
      <a href="#">忘记密码？</a>
    </div>

    <button type="submit" class="btn-primary">登 录</button>
  </form>

  <div class="divider">或</div>

  <div class="social-row">
    <button class="social-btn">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="social-btn">
      <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/></svg>
      Apple
    </button>
  </div>

  <div class="footer">
    还没有账号？<a href="register.html">立即注册</a>
  </div>
</div>

<script>
  document.getElementById('togglePw').addEventListener('click', function () {
    const pw = document.getElementById('password');
    const isPassword = pw.type === 'password';
    pw.type = isPassword ? 'text' : 'password';
    this.innerHTML = isPassword
      ? '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
      : '<svg viewBox="0 0 24 24"><path d="M3.27 2L2 3.27 6.22 7.5A10.5 10.5 0 001 12c1.73 4.39 6 7.5 11 7.5 1.85 0 3.62-.45 5.19-1.27L20.73 22 22 20.73 3.27 2zM12 17c-2.76 0-5-2.24-5-5 0-1.01.3-1.95.82-2.74l1.67 1.67A3.07 3.07 0 009 12a3 3 0 003 3c.47 0 .92-.11 1.33-.3l1.2 1.2A5.06 5.06 0 0112 17zm8.38-1.12l-1.8-1.8c.27-.65.42-1.35.42-2.08 0-2.76-2.24-5-5-5-1.37 0-2.63.55-3.55 1.43L7.65 5.5A10.5 10.5 0 0112 4.5c5 0 9.27 3.11 11 7.5a10.77 10.77 0 01-2.62 3.88z"/></svg>';
  });

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = this.querySelector('.btn-primary');

    const users = JSON.parse(localStorage.getItem('maker_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      btn.textContent = '邮箱或密码错误';
      btn.style.borderColor = '#ef4444';
      btn.style.color = '#ef4444';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '登 录';
        btn.style.borderColor = '';
        btn.style.color = '';
        btn.disabled = false;
      }, 2000);
      return;
    }

    btn.textContent = '登录成功！';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '登 录';
      btn.disabled = false;
    }, 1500);
  });

  const params = new URLSearchParams(window.location.search);
  const emailParam = params.get('email');
  if (emailParam) {
    document.getElementById('email').value = emailParam;
  }
</script>

</body>
</html>
